<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="doc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="32" y="32" width="960" height="960" rx="200" ry="200" fill="url(#bg)"/>
  
  <!-- Document icon (PV) - back -->
  <g filter="url(#shadow)">
    <rect x="280" y="160" width="464" height="580" rx="32" ry="32" fill="url(#doc)"/>
    <!-- Document fold corner -->
    <path d="M640 160 L744 160 L744 264 Z" fill="#cbd5e1"/>
    <path d="M640 160 L640 264 L744 264 Z" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="2"/>
  </g>
  
  <!-- Text lines on document -->
  <rect x="340" y="300" width="280" height="16" rx="8" fill="#94a3b8"/>
  <rect x="340" y="340" width="340" height="16" rx="8" fill="#cbd5e1"/>
  <rect x="340" y="380" width="300" height="16" rx="8" fill="#cbd5e1"/>
  <rect x="340" y="420" width="320" height="16" rx="8" fill="#cbd5e1"/>
  <rect x="340" y="460" width="240" height="16" rx="8" fill="#cbd5e1"/>
  <rect x="340" y="500" width="310" height="16" rx="8" fill="#cbd5e1"/>
  
  <!-- Microphone icon overlapping bottom-right -->
  <g transform="translate(560, 520)">
    <circle cx="120" cy="120" r="145" fill="#1e40af" opacity="0.9"/>
    <circle cx="120" cy="120" r="130" fill="#3b82f6"/>
    
    <!-- Mic body -->
    <rect x="95" y="55" width="50" height="90" rx="25" fill="white"/>
    
    <!-- Mic arc -->
    <path d="M72 115 Q72 175 120 175 Q168 175 168 115" fill="none" stroke="white" stroke-width="10" stroke-linecap="round"/>
    
    <!-- Mic stand -->
    <line x1="120" y1="175" x2="120" y2="200" stroke="white" stroke-width="10" stroke-linecap="round"/>
    <line x1="95" y1="200" x2="145" y2="200" stroke="white" stroke-width="10" stroke-linecap="round"/>
  </g>
  
  <!-- "PV" text badge -->
  <g transform="translate(160, 680)">
    <rect x="0" y="0" width="160" height="72" rx="16" fill="#f59e0b"/>
    <text x="80" y="52" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="bold" fill="white">PV</text>
  </g>
  
  <!-- Sound waves emanating from mic -->
  <path d="M750 560 Q780 580 780 620 Q780 660 750 680" fill="none" stroke="#93c5fd" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <path d="M775 540 Q815 575 815 620 Q815 665 775 700" fill="none" stroke="#93c5fd" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <path d="M800 520 Q850 570 850 620 Q850 670 800 720" fill="none" stroke="#93c5fd" stroke-width="8" stroke-linecap="round" opacity="0.3"/>
</svg>
